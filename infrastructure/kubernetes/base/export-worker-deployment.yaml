apiVersion: apps/v1
kind: Deployment
metadata:
  name: doodle-export-worker
  labels:
    app: doodle-export-worker
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doodle-export-worker
  template:
    metadata:
      labels:
        app: doodle-export-worker
        tier: worker
    spec:
      serviceAccountName: doodle-api
      tolerations:
        - key: workload
          value: export
          effect: NoSchedule
      nodeSelector:
        role: export-worker
      terminationGracePeriodSeconds: 300 # Allow long-running exports to finish
      containers:
        - name: export-worker
          image: REGISTRY/doodle-api:TAG
          command: ["node", "dist/worker.js"]
          env:
            - name: WORKER_MODE
              value: "export"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: doodle-secrets
                  key: database-url
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: doodle-config
                  key: redis-host
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "8Gi"
              cpu: "8000m"
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
      volumes:
        - name: tmp-storage
          emptyDir:
            sizeLimit: 50Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: doodle-export-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: doodle-export-worker
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: External
      external:
        metric:
          name: bull_queue_waiting_jobs
          selector:
            matchLabels:
              queue_name: export
        target:
          type: AverageValue
          averageValue: "5"
