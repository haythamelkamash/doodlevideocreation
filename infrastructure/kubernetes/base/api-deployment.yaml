apiVersion: apps/v1
kind: Deployment
metadata:
  name: doodle-api
  labels:
    app: doodle-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: doodle-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: doodle-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      serviceAccountName: doodle-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: REGISTRY/doodle-api:TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: doodle-secrets
                  key: database-url
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: doodle-config
                  key: redis-host
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: doodle-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: doodle-secrets
                  key: openai-api-key
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: doodle-config
                  key: aws-region
            - name: S3_ASSETS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: doodle-config
                  key: s3-assets-bucket
            - name: S3_EXPORTS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: doodle-config
                  key: s3-exports-bucket
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [doodle-api]
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: doodle-api
  labels:
    app: doodle-api
spec:
  selector:
    app: doodle-api
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: doodle-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: doodle-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: doodle-api-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: doodle-api
